apis:
  - aid: log4j:log4j-api
    name: Log4j API
    description: >-
      The logging facade providing a feature-rich Java interface for application
      logging. Applications code against this stable API while delegating to a
      backing implementation such as Log4j Core.
    humanURL: https://logging.apache.org/log4j/2.x/manual/api.html
    tags:
      - API
      - Facade
      - Java
      - Logging
    properties:
