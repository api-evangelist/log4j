aid: log4j
name: Apache Log4j
description: >-
  Apache Log4j is a versatile, industrial-grade Java logging framework composed
  of an API, its implementation, and components to assist deployment for various
  use cases. It is part of the Apache Logging Services project. Log4j is a Java
  library distributed as Maven artifacts and is consumed via its Java API rather
  than over the network; no public HTTP/REST surface is published.
