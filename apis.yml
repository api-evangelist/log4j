        url: https://logging.apache.org/log4j/2.x/javadoc.html
      - type: SourceCode
        url: https://github.com/apache/logging-log4j2
  - aid: log4j:log4j-core
    name: Log4j Core
    description: >-
      The reference implementation of the Log4j API providing appenders, layouts,
      filters, lookups and configuration that route log events to consoles,
      files, databases, network endpoints and more.
    humanURL: https://logging.apache.org/log4j/2.x/manual/configuration.html
